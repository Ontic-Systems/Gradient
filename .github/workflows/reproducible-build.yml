name: Reproducible Build Check

on:
  # Manual trigger only.
  #
  # This lane is tracking residual cargo/rustc release-build
  # non-determinism (adversarial finding F6 / DDC). It is currently
  # failing by design — see `docs/security/reproducible-builds.md` §
  # "Current status — advisory" and the residual-drift list. Running
  # it on every push to main produced a red check-run on every commit,
  # which polluted the commit-status UI even though the workflow
  # itself reported green via `continue-on-error: true`.
  #
  # Run manually whenever you want to remeasure drift:
  #   gh workflow run reproducible-build.yml --repo Ontic-Systems/Gradient
  #
  # When the underlying drift sources are eliminated, flip this back
  # to `push: branches: [main]` (and PRs touching the relevant paths)
  # and remove `continue-on-error: true` so it becomes a hard gate.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reproducible-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so SOURCE_DATE_EPOCH can be set from the
          # commit timestamp.
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Run reproducible-build check
        run: |
          chmod +x scripts/reproducible-build-check.sh
          scripts/reproducible-build-check.sh
