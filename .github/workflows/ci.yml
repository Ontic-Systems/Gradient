name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # M-6: Weekly scheduled security audit
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: codebase
      - name: Install libcurl
        timeout-minutes: 5
        run: |
          set -exo pipefail
          # Retry apt-get update up to 3x; tolerate failure (Ubuntu image already
          # has a usable index for libcurl4-openssl-dev). The 5-minute job-step
          # timeout is the hard cap so a wedged Azure mirror cannot stall CI.
          for i in 1 2 3; do
            if sudo timeout 60 apt-get update; then break; fi
            echo "apt-get update attempt $i failed; sleeping 5s"
            sleep 5
          done || echo "apt-get update did not succeed; continuing with cached index"
          sudo timeout 120 apt-get install -y libcurl4-openssl-dev
      - name: Install LLVM
        timeout-minutes: 5
        run: |
          set -exo pipefail
          sudo timeout 180 apt-get install -y llvm-18-dev libpolly-18-dev libclang-18-dev clang-18
          echo "LLVM_SYS_180_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV
          echo "LIBPOLLY_LIB_DIR=/usr/lib/llvm-18/lib" >> $GITHUB_ENV
          echo "LIBRARY_PATH=/usr/lib/llvm-18/lib:${LIBRARY_PATH:-}" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/lib/llvm-18/lib:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV
      - name: Build
        working-directory: codebase
        run: cargo build --workspace
      # LLVM backend build is disabled pending resolution of Polly library linking
      # See: https://github.com/Ontic-Systems/Gradient/issues/3
      # - name: Build with LLVM backend
      #   working-directory: codebase
      #   run: cargo build -p gradient-compiler --features llvm
      - name: Test
        working-directory: codebase
        # Skip self_hosting_smoke tests - self-hosted parser.gr is experimental
        run: cargo test --workspace --exclude gradient-lsp -- --skip self_hosting
      - name: Test LSP (unit only)
        working-directory: codebase
        run: cargo test -p gradient-lsp --bin gradient-lsp
      - name: Clippy
        working-directory: codebase
        run: cargo clippy --workspace -- -D warnings

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: codebase
      - name: Install cargo-audit
        working-directory: codebase
        run: cargo install cargo-audit --locked --version 0.22.1
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.19.4
      - name: Audit dependencies
        working-directory: codebase
        run: cargo audit --file Cargo.lock
      # M-6: cargo-deny for supply chain security
      - name: Deny check (licenses, advisories, bans)
        working-directory: codebase
        run: cargo deny check
      # M-7: Verify OpenSSL is not in dependency tree
      - name: Verify no OpenSSL dependency
        working-directory: codebase
        run: |
          if cargo tree -i openssl 2>/dev/null | grep -q openssl; then
            echo "ERROR: OpenSSL found in dependency tree"
            exit 1
          fi
          echo "PASS: No OpenSSL in dependency tree"

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: codebase
      - name: Build compiler
        working-directory: codebase
        run: cargo build -p gradient-compiler
      - name: Install libcurl
        timeout-minutes: 5
        run: |
          set -exo pipefail
          # See `check` job for rationale: retry update, tolerate failure,
          # rely on cached index for the install. Per-command timeout is the
          # hard cap so a wedged mirror cannot stall the job indefinitely.
          for i in 1 2 3; do
            if sudo timeout 60 apt-get update; then break; fi
            echo "apt-get update attempt $i failed; sleeping 5s"
            sleep 5
          done || echo "apt-get update did not succeed; continuing with cached index"
          sudo timeout 120 apt-get install -y libcurl4-openssl-dev
      - name: End-to-end compile tests
        working-directory: codebase/compiler
        run: |
          for f in tests/*.gr; do
            echo "Testing $f..."
            cargo run --quiet --bin gradient-compiler -- "$f" /tmp/test.o
            cc /tmp/test.o runtime/gradient_runtime.c -o /tmp/test_binary -lcurl
            /tmp/test_binary
            echo "PASS: $f"
          done

  wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: codebase
      - name: Build compiler with WASM feature
        working-directory: codebase
        run: cargo build -p gradient-compiler --features wasm
      - name: Clippy with WASM feature
        working-directory: codebase
        run: cargo clippy -p gradient-compiler --features wasm -- -D warnings
      - name: Run WASM unit tests
        working-directory: codebase
        run: cargo test -p gradient-compiler --features wasm --test wasm_tests
      - name: Run WASM E2E tests
        working-directory: codebase
        run: cargo test -p gradient-compiler --features wasm --test wasm_e2e_tests
      - name: Install wasmtime (pinned + SHA-verified)
        env:
          # Pin wasmtime version and SHA so a compromised installer or moved
          # release artifact cannot inject arbitrary code into CI.
          WASMTIME_VERSION: v44.0.0
          # SHA-256 of wasmtime-${WASMTIME_VERSION}-x86_64-linux.tar.xz from
          # https://github.com/bytecodealliance/wasmtime/releases/download/${WASMTIME_VERSION}/
          # (replaces the previous `curl https://wasmtime.dev/install.sh | bash` pattern).
          WASMTIME_SHA256: 52eba06fe9f4364aa6164a4a3eafb2ca692ba9a756cbe8137b5574871f8cbfc8
        run: |
          set -euo pipefail
          ARCHIVE="wasmtime-${WASMTIME_VERSION}-x86_64-linux.tar.xz"
          URL="https://github.com/bytecodealliance/wasmtime/releases/download/${WASMTIME_VERSION}/${ARCHIVE}"
          TMP="$(mktemp -d)"
          curl --proto '=https' --tlsv1.2 -fsSL --retry 5 --retry-connrefused \
            -o "$TMP/$ARCHIVE" "$URL"
          echo "${WASMTIME_SHA256}  $TMP/$ARCHIVE" | sha256sum -c -
          tar -xJf "$TMP/$ARCHIVE" -C "$TMP"
          mkdir -p "$HOME/.wasmtime/bin"
          install -m 0755 "$TMP/wasmtime-${WASMTIME_VERSION}-x86_64-linux/wasmtime" \
            "$HOME/.wasmtime/bin/wasmtime"
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"
          "$HOME/.wasmtime/bin/wasmtime" --version
      - name: Test WASM compilation via CLI
        working-directory: codebase/compiler
        run: |
          echo 'fn main() -> Int:' > /tmp/test.gr
          echo '    ret 42' >> /tmp/test.gr
          cargo run --quiet --bin gradient-compiler --features wasm -- /tmp/test.gr /tmp/test.wasm --experimental
          ls -la /tmp/test.wasm
          echo "WASM file generated successfully"
      - name: Validate WASM with wasmtime
        working-directory: codebase/compiler
        run: |
          # Add wasmtime to PATH (not persisted from previous step)
          export PATH="$HOME/.wasmtime/bin:$PATH"
          wasmtime --version
          # Try to validate the WASM file
          wasmtime validate /tmp/test.wasm || echo "Note: wasmtime validate not available in this version"
          # Try to run and get exit code
          wasmtime --invoke main /tmp/test.wasm || echo "Note: Function return value may cause non-zero exit"
