name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: codebase
      - name: Build
        working-directory: codebase
        run: cargo build --workspace
      - name: Test
        working-directory: codebase
        run: cargo test --workspace --exclude gradient-lsp --exclude gradient-test-framework
      - name: Test framework (sequential to avoid temp dir races)
        working-directory: codebase
        run: cargo test -p gradient-test-framework -- --test-threads=1
      - name: Test LSP (unit only)
        working-directory: codebase
        run: cargo test -p gradient-lsp --bin gradient-lsp
      - name: Clippy
        working-directory: codebase
        run: cargo clippy --workspace -- -D warnings

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: codebase
      - name: Install cargo-audit
        working-directory: codebase
        run: cargo install cargo-audit --locked --version 0.22.1
      - name: Audit dependencies
        working-directory: codebase
        run: cargo audit --file Cargo.lock

  e2e:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: codebase
      - name: Build compiler
        working-directory: codebase
        run: cargo build -p gradient-compiler
      - name: End-to-end compile tests
        working-directory: codebase/compiler
        run: |
          for f in tests/*.gr; do
            echo "Testing $f..."
            cargo run --quiet -- "$f" /tmp/test.o
            cc /tmp/test.o runtime/gradient_runtime.c -o /tmp/test_binary
            /tmp/test_binary
            echo "PASS: $f"
          done
