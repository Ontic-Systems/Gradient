name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # M-6: Weekly scheduled security audit
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: codebase
      - name: Install libcurl
        timeout-minutes: 5
        run: |
          set -exo pipefail
          # Retry apt-get update up to 3x; tolerate failure (Ubuntu image already
          # has a usable index for libcurl4-openssl-dev). The 5-minute job-step
          # timeout is the hard cap so a wedged Azure mirror cannot stall CI.
          for i in 1 2 3; do
            if sudo timeout 60 apt-get update; then break; fi
            echo "apt-get update attempt $i failed; sleeping 5s"
            sleep 5
          done || echo "apt-get update did not succeed; continuing with cached index"
          for i in 1 2 3; do
            if sudo timeout 120 apt-get install -y libcurl4-openssl-dev; then
              break
            fi
            echo "Install libcurl attempt $i failed; sleeping 10s before retry"
            sleep 10
            if [ "$i" = "3" ]; then
              echo "Install libcurl exhausted retries"
              exit 124
            fi
          done
      - name: Install LLVM
        timeout-minutes: 5
        run: |
          set -exo pipefail
          # Retry apt-get install up to 3x; the Azure mirror occasionally
          # throttles libclang-18-dev (~28.8 MB) past the per-attempt
          # 180s window. Each attempt has its own timeout so a wedged
          # mirror cannot stall CI past the step's 5-minute cap. See
          # #408 / run 25382616280 for the canonical failure.
          for i in 1 2 3; do
            if sudo timeout 180 apt-get install -y llvm-18-dev libpolly-18-dev libclang-18-dev clang-18; then
              break
            fi
            echo "Install LLVM attempt $i failed; sleeping 10s before retry"
            sleep 10
            if [ "$i" = "3" ]; then
              echo "Install LLVM exhausted retries"
              exit 124
            fi
          done
          echo "LLVM_SYS_180_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV
          echo "LIBPOLLY_LIB_DIR=/usr/lib/llvm-18/lib" >> $GITHUB_ENV
          echo "LIBRARY_PATH=/usr/lib/llvm-18/lib:${LIBRARY_PATH:-}" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/lib/llvm-18/lib:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV
      - name: Build
        working-directory: codebase
        run: cargo build --workspace
      # LLVM backend build — gated behind `--features llvm`. The lib +
      # scaffold smoke restored the backend to a buildable state in
      # PR #339-launch-tier; broader integration tests still bit-rotted
      # and are tracked separately.
      - name: Build LLVM backend (feature gated)
        working-directory: codebase
        run: cargo build -p gradient-compiler --features llvm --lib
      - name: Test
        working-directory: codebase
        # Skip self_hosting_smoke tests - self-hosted parser.gr is experimental
        run: cargo test --workspace --exclude gradient-lsp -- --skip self_hosting
      - name: Test LLVM scaffold smoke (feature gated)
        working-directory: codebase
        run: cargo test -p gradient-compiler --features llvm --test llvm_scaffold_smoke
      - name: Test LLVM backend integration (named subset, feature gated)
        # Targeted re-enable of integration tests that the LLVM backend
        # actually supports today. The remaining 4 tests in
        # `llvm_backend_integration.rs` still depend on builtins not
        # yet lowered (`list_set`/`list_slice`/enum/`string_to_int`)
        # and remain bit-rotted — excluded here on purpose. As builtin
        # lowerings land, append the unblocked tests here.
        # History:
        #  - #551 introduced the print-builtin subset (11 names).
        #  - #555 added the PHI-incoming/reachability fix that
        #    unblocked the remaining straight-line and recursion tests
        #    plus their `*_backends_match` companions (15 added below).
        #  - #581 lowered list-read builtins (`list_literal_N` /
        #    `list_length` / `list_get` / `list_is_empty` / `list_head`)
        #    and unblocked `test_llvm_list_operations`.
        working-directory: codebase
        run: |
          cargo test -p gradient-compiler --features llvm \
            --test llvm_backend_integration -- --test-threads=1 \
            test_llvm_hello_world \
            test_cranelift_hello_world \
            test_hello_world_backends_match \
            test_llvm_arithmetic_int \
            test_arithmetic_int_backends_match \
            test_arithmetic_backends_match \
            test_complex_backends_match \
            test_factorial_backends_match \
            test_llvm_empty_main \
            test_llvm_comparison_operators \
            test_llvm_nested_function_calls \
            test_llvm_function_calls \
            test_llvm_function_calls_backends_match \
            test_llvm_if_else \
            test_llvm_if_else_backends_match \
            test_llvm_nested_if \
            test_llvm_nested_if_backends_match \
            test_llvm_factorial \
            test_llvm_fibonacci \
            test_llvm_fibonacci_backends_match \
            test_llvm_multiple_variables \
            test_llvm_variable_assignment \
            test_llvm_large_numbers \
            test_llvm_negative_numbers \
            test_llvm_gcd_algorithm \
            test_llvm_prime_check \
            test_llvm_string_length \
            test_llvm_string_operations \
            test_llvm_arithmetic_float \
            test_llvm_list_operations
      - name: Test LSP (unit only)
        working-directory: codebase
        run: cargo test -p gradient-lsp --bin gradient-lsp
      - name: Clippy
        working-directory: codebase
        run: cargo clippy --workspace -- -D warnings

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: codebase
      - name: Install cargo-audit
        working-directory: codebase
        run: cargo install cargo-audit --locked --version 0.22.1
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.19.4
      - name: Audit dependencies
        working-directory: codebase
        run: cargo audit --file Cargo.lock
      # M-6: cargo-deny for supply chain security
      - name: Deny check (licenses, advisories, bans)
        working-directory: codebase
        run: cargo deny check
      # M-7: Verify OpenSSL is not in dependency tree
      - name: Verify no OpenSSL dependency
        working-directory: codebase
        run: |
          if cargo tree -i openssl 2>/dev/null | grep -q openssl; then
            echo "ERROR: OpenSSL found in dependency tree"
            exit 1
          fi
          echo "PASS: No OpenSSL in dependency tree"

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: codebase
      - name: Build compiler
        working-directory: codebase
        run: cargo build -p gradient-compiler
      - name: Install libcurl
        timeout-minutes: 5
        run: |
          set -exo pipefail
          # See `check` job for rationale: retry update, tolerate failure,
          # rely on cached index for the install. Per-command timeout is the
          # hard cap so a wedged mirror cannot stall the job indefinitely.
          for i in 1 2 3; do
            if sudo timeout 60 apt-get update; then break; fi
            echo "apt-get update attempt $i failed; sleeping 5s"
            sleep 5
          done || echo "apt-get update did not succeed; continuing with cached index"
          for i in 1 2 3; do
            if sudo timeout 120 apt-get install -y libcurl4-openssl-dev; then
              break
            fi
            echo "Install libcurl attempt $i failed; sleeping 10s before retry"
            sleep 10
            if [ "$i" = "3" ]; then
              echo "Install libcurl exhausted retries"
              exit 124
            fi
          done
      - name: End-to-end compile tests
        working-directory: codebase/compiler
        run: |
          for f in tests/*.gr; do
            echo "Testing $f..."
            cargo run --quiet --bin gradient-compiler -- "$f" /tmp/test.o
            cc /tmp/test.o runtime/gradient_runtime.c -o /tmp/test_binary -lcurl
            /tmp/test_binary
            echo "PASS: $f"
          done

  wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: codebase
      - name: Build compiler with WASM feature
        working-directory: codebase
        run: cargo build -p gradient-compiler --features wasm
      - name: Clippy with WASM feature
        working-directory: codebase
        run: cargo clippy -p gradient-compiler --features wasm -- -D warnings
      - name: Run WASM unit tests
        working-directory: codebase
        run: cargo test -p gradient-compiler --features wasm --test wasm_tests
      - name: Run WASM E2E tests
        working-directory: codebase
        run: cargo test -p gradient-compiler --features wasm --test wasm_e2e_tests
      - name: Install wasmtime (pinned + SHA-verified)
        env:
          # Pin wasmtime version and SHA so a compromised installer or moved
          # release artifact cannot inject arbitrary code into CI.
          WASMTIME_VERSION: v44.0.0
          # SHA-256 of wasmtime-${WASMTIME_VERSION}-x86_64-linux.tar.xz from
          # https://github.com/bytecodealliance/wasmtime/releases/download/${WASMTIME_VERSION}/
          # (replaces the previous `curl https://wasmtime.dev/install.sh | bash` pattern).
          WASMTIME_SHA256: 52eba06fe9f4364aa6164a4a3eafb2ca692ba9a756cbe8137b5574871f8cbfc8
        run: |
          set -euo pipefail
          ARCHIVE="wasmtime-${WASMTIME_VERSION}-x86_64-linux.tar.xz"
          URL="https://github.com/bytecodealliance/wasmtime/releases/download/${WASMTIME_VERSION}/${ARCHIVE}"
          TMP="$(mktemp -d)"
          curl --proto '=https' --tlsv1.2 -fsSL --retry 5 --retry-connrefused \
            -o "$TMP/$ARCHIVE" "$URL"
          echo "${WASMTIME_SHA256}  $TMP/$ARCHIVE" | sha256sum -c -
          tar -xJf "$TMP/$ARCHIVE" -C "$TMP"
          mkdir -p "$HOME/.wasmtime/bin"
          install -m 0755 "$TMP/wasmtime-${WASMTIME_VERSION}-x86_64-linux/wasmtime" \
            "$HOME/.wasmtime/bin/wasmtime"
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"
          "$HOME/.wasmtime/bin/wasmtime" --version
      - name: Test WASM compilation via CLI
        working-directory: codebase/compiler
        run: |
          echo 'fn main() -> Int:' > /tmp/test.gr
          echo '    ret 42' >> /tmp/test.gr
          cargo run --quiet --bin gradient-compiler --features wasm -- /tmp/test.gr /tmp/test.wasm --experimental
          ls -la /tmp/test.wasm
          echo "WASM file generated successfully"
      - name: Validate WASM with wasmtime
        working-directory: codebase/compiler
        run: |
          # Add wasmtime to PATH (not persisted from previous step)
          export PATH="$HOME/.wasmtime/bin:$PATH"
          wasmtime --version
          # Try to validate the WASM file
          wasmtime validate /tmp/test.wasm || echo "Note: wasmtime validate not available in this version"
          # Try to run and get exit code
          wasmtime --invoke main /tmp/test.wasm || echo "Note: Function return value may cause non-zero exit"

  # Verified-tier discharge lane (sub-issue #331, ADR 0003 step 5).
  #
  # Installs Z3 and runs the @verified contract discharger against the
  # stdlib pilot modules under `compiler/stdlib/`: Int arithmetic, Bool algebra,
  # comparisons, arithmetic identities/axioms, ordering, pair/symmetric ops,
  # selection, transitive chains, witnesses, parity/step witnesses, and
  # interval/bound-preservation (`core_*_ops.gr` siblings).
  # `GRADIENT_Z3_REQUIRED=1` makes a missing solver a hard failure so
  # this lane genuinely exercises the parser → AST → checker → VC
  # encoder → Z3 path on every green build. The other lanes skip the
  # integration tests cleanly when Z3 is absent (see
  # `tests/vc_z3_integration.rs`).
  verified:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: codebase
      - name: Install Z3
        timeout-minutes: 5
        run: |
          set -exo pipefail
          # Mirror the retry pattern used by the `check` job for apt
          # installs. Z3 is small (<5 MB) so a single attempt typically
          # succeeds, but the Azure mirror occasionally throttles.
          for i in 1 2 3; do
            if sudo timeout 60 apt-get update; then break; fi
            echo "apt-get update attempt $i failed; sleeping 5s"
            sleep 5
          done || echo "apt-get update did not succeed; continuing with cached index"
          for i in 1 2 3; do
            if sudo timeout 120 apt-get install -y z3; then break; fi
            echo "Install Z3 attempt $i failed; sleeping 10s before retry"
            sleep 10
            if [ "$i" = "3" ]; then
              echo "Install Z3 exhausted retries"
              exit 124
            fi
          done
          z3 --version
      - name: Run @verified discharger integration tests
        working-directory: codebase
        env:
          # Make a missing Z3 binary a hard failure rather than a
          # silent skip; this is the lane that proves the discharge
          # step actually runs.
          GRADIENT_Z3_REQUIRED: "1"
        run: |
          cargo test -p gradient-compiler --test vc_z3_integration -- --nocapture
          cargo test -p gradient-compiler --test vc_stdlib_pilot         -- --nocapture
          cargo test -p gradient-compiler --test vc_stdlib_pilot_bool    -- --nocapture
          cargo test -p gradient-compiler --test vc_stdlib_pilot_compare -- --nocapture
          cargo test -p gradient-compiler --test vc_stdlib_pilot_int_ops -- --nocapture
          cargo test -p gradient-compiler --test vc_stdlib_pilot_arith_ops -- --nocapture
          cargo test -p gradient-compiler --test vc_stdlib_pilot_order_ops -- --nocapture
          cargo test -p gradient-compiler --test vc_stdlib_pilot_pair_ops  -- --nocapture
          cargo test -p gradient-compiler --test vc_stdlib_pilot_select_ops -- --nocapture
          cargo test -p gradient-compiler --test vc_stdlib_pilot_chain_ops -- --nocapture
          cargo test -p gradient-compiler --test vc_stdlib_pilot_witness_ops -- --nocapture
          cargo test -p gradient-compiler --test vc_stdlib_pilot_parity_ops -- --nocapture
          cargo test -p gradient-compiler --test vc_stdlib_pilot_interval_ops -- --nocapture
          cargo test -p gradient-compiler --test vc_stdlib_pilot_neg_ops -- --nocapture
          cargo test -p gradient-compiler --test vc_stdlib_pilot_inequality_chain_ops -- --nocapture
          cargo test -p gradient-compiler --test vc_stdlib_pilot_assoc_ops -- --nocapture
          cargo test -p gradient-compiler --test vc_stdlib_pilot_swap_ops -- --nocapture
          cargo test -p gradient-compiler --test vc_stdlib_pilot_zero_one_ops -- --nocapture
          cargo test -p gradient-compiler --test vc_stdlib_pilot_successor_ops -- --nocapture

  # Hello-world size-budget gate (sub-issue #338, ADR 0005, Epic E5).
  #
  # Builds two representative `gradient build` outputs and asserts
  # post-strip binary size stays under absolute byte budgets so
  # future PRs that bloat the canonical runtime or any of the modular
  # variant runtimes get caught at CI time. See
  # `build-system/tests/size_budget.rs` for the budget rationale and
  # the planned tightening once the rc/COW + actor + async runtime
  # extractions land (#538/#539/#540 follow-ons).
  size-budget:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: codebase
      - name: Install libcurl
        timeout-minutes: 5
        run: |
          set -exo pipefail
          # See `check` job for rationale: retry update, tolerate failure,
          # rely on cached index for the install. Per-command timeout is
          # the hard cap so a wedged mirror cannot stall the job.
          for i in 1 2 3; do
            if sudo timeout 60 apt-get update; then break; fi
            echo "apt-get update attempt $i failed; sleeping 5s"
            sleep 5
          done || echo "apt-get update did not succeed; continuing with cached index"
          for i in 1 2 3; do
            if sudo timeout 120 apt-get install -y libcurl4-openssl-dev binutils; then
              break
            fi
            echo "Install size-budget deps attempt $i failed; sleeping 10s before retry"
            sleep 10
            if [ "$i" = "3" ]; then
              echo "Install size-budget deps exhausted retries"
              exit 124
            fi
          done
      - name: Build workspace
        working-directory: codebase
        run: cargo build -p gradient -p gradient-compiler
      - name: Size-budget integration tests
        working-directory: codebase
        run: cargo test -p gradient --test size_budget -- --nocapture

  # `@attribute` mention guard lane (backlog: Pitfall 35 follow-on).
  #
  # Gradient surface uses `@`-prefixed attributes (`@verified`, `@untrusted`,
  # `@cap`, `@app`, `@system`, `@allocator`, …). Many of these names map to
  # real GitHub accounts (re-verified post-#621 via `GET /users/<name>`),
  # so writing them unguarded in a commit subject, PR title, PR body, issue
  # title, or issue body pings real strangers. CONTRIBUTING.md mandates
  # backticking. This lane enforces it for incoming PRs by running the
  # local audit script against (a) the PR title, (b) the PR body, and
  # (c) every commit subject + body in the PR.
  #
  # Push-to-main events are skipped: pre-existing history was rewritten
  # in #621 and re-litigating it on every merge would surface noise
  # without recovery. The script's `--self-test` mode runs on every PR
  # so any regression in the recognizer surfaces immediately.
  attribute-mention-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Need full history so we can iterate the PR's commit range.
          fetch-depth: 0
      - name: Run script self-tests
        run: python3 scripts/check-attribute-mentions.py --self-test
      - name: Check PR title and body
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          # Empty PR body is allowed: skip if unset/empty so the script
          # doesn't error on a missing input. Title is always present.
          if [ -n "${PR_BODY:-}" ]; then
            printf '%s' "$PR_BODY" > /tmp/pr_body.txt
            python3 scripts/check-attribute-mentions.py \
              --text "$PR_TITLE" \
              --file /tmp/pr_body.txt
          else
            python3 scripts/check-attribute-mentions.py --text "$PR_TITLE"
          fi
      - name: Check commit messages in PR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Iterate every commit in the PR range. `%B` yields subject + body.
          # `--reverse` is for deterministic ordering in the failure output;
          # the script's exit code is what gates the lane.
          fail=0
          mapfile -t SHAS < <(git log --format='%H' --reverse "${BASE_SHA}..${HEAD_SHA}")
          for sha in "${SHAS[@]}"; do
            msg=$(git log -1 --format='%B' "$sha")
            short=$(echo "$sha" | cut -c1-12)
            printf '%s' "$msg" > /tmp/commit_msg.txt
            if ! python3 scripts/check-attribute-mentions.py \
                --file /tmp/commit_msg.txt; then
              echo "::error::commit $short has unbackticked Gradient attribute mentions"
              fail=1
            fi
          done
          exit "$fail"
