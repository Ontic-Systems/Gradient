<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <!-- Violet → sky, top to bottom -->
    <linearGradient id="mark" x1="100" y1="20" x2="100" y2="172" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>

    <!-- Clip contour lines to inside the triangle -->
    <clipPath id="tri">
      <polygon points="100,20 183,172 17,172"/>
    </clipPath>
  </defs>

  <!-- Background: white -->
  <rect width="600" height="200" rx="12" fill="#ffffff"/>
  <rect width="600" height="200" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Nabla: solid gradient fill -->
  <polygon
    points="100,20 183,172 17,172"
    fill="url(#mark)"
  />

  <!--
    Contour / level lines inside the triangle.
    Each line sits at 25%, 50%, 75% down the height of the nabla —
    a reference to topographic gradients and gradient descent level curves.
    Clipped to the triangle bounds.
  -->
  <g clip-path="url(#tri)" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.3">
    <line x1="79"  y1="58"  x2="121" y2="58"/>
    <line x1="58"  y1="96"  x2="142" y2="96"/>
    <line x1="38"  y1="134" x2="162" y2="134"/>
  </g>

  <!-- Divider -->
  <line x1="210" y1="46" x2="210" y2="154" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Wordmark -->
  <text
    x="226" y="111"
    font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
    font-size="44"
    font-weight="700"
    letter-spacing="4"
    fill="#0f172a"
  >GRADIENT</text>

  <!-- Tagline -->
  <text
    x="227" y="137"
    font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
    font-size="11"
    letter-spacing="3.5"
    fill="#64748b"
  >THE LANGUAGE AGENTS WRITE IN</text>
</svg>
