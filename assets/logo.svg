<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <!-- Bright violet → cyan, top to bottom -->
    <linearGradient id="mark" x1="100" y1="20" x2="100" y2="172" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Wordmark: slight left-to-right fade from white to off-white -->
    <linearGradient id="word" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" rx="12" fill="#0d1117"/>
  <rect width="600" height="200" rx="12" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- Nabla: full gradient fill + crisp edge -->
  <polygon
    points="100,20 183,172 17,172"
    fill="url(#mark)"
    stroke="#ffffff"
    stroke-width="1"
    stroke-opacity="0.12"
    stroke-linejoin="round"
  />

  <!-- Vertex nodes — network / circuit feel -->
  <circle cx="100" cy="20"  r="4" fill="#ffffff" opacity="0.55"/>
  <circle cx="183" cy="172" r="4" fill="#ffffff" opacity="0.55"/>
  <circle cx="17"  cy="172" r="4" fill="#ffffff" opacity="0.55"/>

  <!-- Divider -->
  <line x1="210" y1="46" x2="210" y2="154" stroke="#21262d" stroke-width="1.5"/>

  <!-- Wordmark -->
  <text
    x="226" y="111"
    font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
    font-size="44"
    font-weight="700"
    letter-spacing="4"
    fill="url(#word)"
  >GRADIENT</text>

  <!-- Tagline -->
  <text
    x="227" y="137"
    font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
    font-size="11"
    letter-spacing="3.5"
    fill="#8b949e"
  >THE LANGUAGE AGENTS WRITE IN</text>
</svg>
