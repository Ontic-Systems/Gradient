<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <!--
      Diagonal gradient: deep indigo (top-left) → sky blue (bottom-right).
      Runs corner-to-corner of the mark area for maximum dynamism.
    -->
    <linearGradient id="g" x1="18" y1="22" x2="182" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="600" height="200" fill="#ffffff"/>

  <!--
    ∇ ring mark.
    Outer triangle: top=(100,22), right=(182,170), left=(18,170)
    Inner triangle (cutout, ~60% scale from centroid): top=(100,62), left=(51,150), right=(149,150)
    fill-rule=evenodd punches the inner shape as a hole — creating a precision frame mark
    inspired by SLeek, WOLF & CO, and the double-A ArtStation logo in the moodboard.
  -->
  <path
    d="M100,22 L182,170 L18,170 Z M100,62 L51,150 L149,150 Z"
    fill="url(#g)"
    fill-rule="evenodd"
  />

  <!-- Thin divider -->
  <line x1="212" y1="46" x2="212" y2="154" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Wordmark -->
  <text
    x="228" y="108"
    font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
    font-size="44"
    font-weight="700"
    letter-spacing="4"
    fill="#0f172a"
  >GRADIENT</text>

  <!-- Tagline -->
  <text
    x="229" y="134"
    font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
    font-size="11"
    letter-spacing="3.5"
    fill="#94a3b8"
  >THE LANGUAGE AGENTS WRITE IN</text>
</svg>
