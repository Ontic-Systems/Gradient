<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <!-- Main gradient: electric blue → cyan → emerald -->
    <linearGradient id="glyph-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4f8aff"/>
      <stop offset="50%"  stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00ff99"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c8d8ff"/>
      <stop offset="100%" stop-color="#a0f0d0"/>
    </linearGradient>

    <!-- Glow filter for the nabla -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for text -->
    <filter id="text-glow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to rounded rect -->
    <clipPath id="card-clip">
      <rect width="600" height="200" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" rx="16" fill="#08090f"/>

  <!-- Subtle grid lines -->
  <g clip-path="url(#card-clip)" opacity="0.04" stroke="#4f8aff" stroke-width="1">
    <line x1="0"   y1="40"  x2="600" y2="40"/>
    <line x1="0"   y1="80"  x2="600" y2="80"/>
    <line x1="0"   y1="120" x2="600" y2="120"/>
    <line x1="0"   y1="160" x2="600" y2="160"/>
    <line x1="60"  y1="0"   x2="60"  y2="200"/>
    <line x1="120" y1="0"   x2="120" y2="200"/>
    <line x1="180" y1="0"   x2="180" y2="200"/>
    <line x1="240" y1="0"   x2="240" y2="200"/>
    <line x1="300" y1="0"   x2="300" y2="200"/>
    <line x1="360" y1="0"   x2="360" y2="200"/>
    <line x1="420" y1="0"   x2="420" y2="200"/>
    <line x1="480" y1="0"   x2="480" y2="200"/>
    <line x1="540" y1="0"   x2="540" y2="200"/>
  </g>

  <!-- Ambient glow behind the nabla -->
  <ellipse cx="100" cy="100" rx="70" ry="60" fill="#00e5ff" opacity="0.05"/>

  <!-- ∇ Nabla symbol — downward triangle, gradient filled, with glow -->
  <g filter="url(#glow)">
    <polygon
      points="100,24 172,156 28,156"
      fill="url(#glyph-grad)"
      stroke="none"
    />
    <!-- Inner cutout to make it feel lighter / modern -->
    <polygon
      points="100,52 152,144 48,144"
      fill="#08090f"
      opacity="0.55"
    />
    <!-- Thin gradient stroke outline -->
    <polygon
      points="100,24 172,156 28,156"
      fill="none"
      stroke="url(#glyph-grad)"
      stroke-width="1.5"
      opacity="0.6"
    />
  </g>

  <!-- Vertical separator -->
  <line x1="204" y1="40" x2="204" y2="160" stroke="#4f8aff" stroke-width="1" opacity="0.18"/>

  <!-- GRADIENT wordmark -->
  <text
    x="228" y="108"
    font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
    font-size="52"
    font-weight="700"
    letter-spacing="6"
    fill="url(#text-grad)"
    filter="url(#text-glow)"
  >GRADIENT</text>

  <!-- Tagline -->
  <text
    x="229" y="138"
    font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
    font-size="13"
    letter-spacing="2.5"
    fill="#4f8aff"
    opacity="0.75"
  >THE LANGUAGE AGENTS WRITE IN</text>

  <!-- Small version/status badge -->
  <rect x="229" y="152" width="72" height="18" rx="4" fill="#4f8aff" opacity="0.12"/>
  <text
    x="265" y="165"
    font-family="'SF Mono', 'JetBrains Mono', monospace"
    font-size="10"
    text-anchor="middle"
    fill="#4f8aff"
    opacity="0.8"
    letter-spacing="1"
  >pre-alpha</text>

  <!-- Border glow -->
  <rect width="600" height="200" rx="16" fill="none" stroke="url(#glyph-grad)" stroke-width="1" opacity="0.2"/>
</svg>