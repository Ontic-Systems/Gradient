<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <!-- Nabla gradient: indigo → sky, top to bottom -->
    <linearGradient id="mark" x1="100" y1="22" x2="100" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" rx="12" fill="#0d1117"/>

  <!-- Border: 1px, very subtle -->
  <rect width="600" height="200" rx="12" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- ∇ Nabla — stroke only, clean gradient, rounded joins -->
  <polygon
    points="100,22 182,170 18,170"
    fill="#6366f1"
    fill-opacity="0.05"
    stroke="url(#mark)"
    stroke-width="3.5"
    stroke-linejoin="round"
  />

  <!-- Divider -->
  <line x1="208" y1="48" x2="208" y2="152" stroke="#21262d" stroke-width="1.5"/>

  <!-- Wordmark -->
  <text
    x="224" y="110"
    font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
    font-size="44"
    font-weight="700"
    letter-spacing="4"
    fill="#e6edf3"
  >GRADIENT</text>

  <!-- Tagline -->
  <text
    x="225" y="136"
    font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
    font-size="11"
    letter-spacing="3.5"
    fill="#3d444d"
  >THE LANGUAGE AGENTS WRITE IN</text>
</svg>
